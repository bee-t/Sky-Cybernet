<svg width="400" height="120" viewBox="0 0 400 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon Section -->
  <g transform="translate(10, 10)">
    <!-- Hexagonal border -->
    <path
      d="M 30 5 L 70 5 L 95 50 L 70 95 L 30 95 L 5 50 Z"
      stroke="#00ff41"
      stroke-width="2"
      fill="black"
      opacity="0.9"
    />
    
    <!-- Inner targeting reticle -->
    <circle cx="50" cy="50" r="25" stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.6" />
    <circle cx="50" cy="50" r="15" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.4" />
    
    <!-- Crosshair -->
    <line x1="50" y1="20" x2="50" y2="35" stroke="#00ff41" stroke-width="2" />
    <line x1="50" y1="65" x2="50" y2="80" stroke="#00ff41" stroke-width="2" />
    <line x1="20" y1="50" x2="35" y2="50" stroke="#00ff41" stroke-width="2" />
    <line x1="65" y1="50" x2="80" y2="50" stroke="#00ff41" stroke-width="2" />
    
    <!-- Center SC -->
    <text
      x="50"
      y="58"
      font-size="24"
      font-weight="bold"
      font-family="monospace"
      fill="#00ff41"
      text-anchor="middle"
      style="filter: drop-shadow(0 0 8px #00ff41)"
    >
      SC
    </text>
  </g>
  
  <!-- Text Section -->
  <g transform="translate(125, 0)">
    <!-- Main Title -->
    <text
      x="0"
      y="50"
      font-size="36"
      font-weight="bold"
      font-family="monospace"
      fill="#00ff41"
      letter-spacing="4"
      style="filter: drop-shadow(0 0 10px #00ff41)"
    >
      SKY-CYBERNET
    </text>
    
    <!-- Subtitle -->
    <text
      x="0"
      y="75"
      font-size="14"
      font-family="monospace"
      fill="#00ff41"
      letter-spacing="3"
      opacity="0.7"
    >
      STRATEGIC NETWORK
    </text>
    
    <!-- Tactical line decorations -->
    <line x1="0" y1="85" x2="60" y2="85" stroke="#00ff41" stroke-width="1" opacity="0.5" />
    <line x1="220" y1="85" x2="280" y2="85" stroke="#00ff41" stroke-width="1" opacity="0.5" />
    
    <!-- Corner brackets -->
    <path d="M -5 20 L -5 10 L 5 10" stroke="#00ff41" stroke-width="1.5" opacity="0.6" />
    <path d="M 275 10 L 285 10 L 285 20" stroke="#00ff41" stroke-width="1.5" opacity="0.6" />
    <path d="M 285 80 L 285 90 L 275 90" stroke="#00ff41" stroke-width="1.5" opacity="0.6" />
    <path d="M 5 90 L -5 90 L -5 80" stroke="#00ff41" stroke-width="1.5" opacity="0.6" />
  </g>
</svg>
