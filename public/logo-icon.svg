<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Hexagonal border (tactical) -->
  <path
    d="M 30 5 L 70 5 L 95 50 L 70 95 L 30 95 L 5 50 Z"
    stroke="#00ff41"
    stroke-width="2"
    fill="black"
    opacity="0.9"
  />
  
  <!-- Inner targeting reticle -->
  <circle cx="50" cy="50" r="25" stroke="#00ff41" stroke-width="1.5" fill="none" opacity="0.6" />
  <circle cx="50" cy="50" r="15" stroke="#00ff41" stroke-width="1" fill="none" opacity="0.4" />
  
  <!-- Crosshair -->
  <line x1="50" y1="20" x2="50" y2="35" stroke="#00ff41" stroke-width="2" />
  <line x1="50" y1="65" x2="50" y2="80" stroke="#00ff41" stroke-width="2" />
  <line x1="20" y1="50" x2="35" y2="50" stroke="#00ff41" stroke-width="2" />
  <line x1="65" y1="50" x2="80" y2="50" stroke="#00ff41" stroke-width="2" />
  
  <!-- Center SC monogram -->
  <text
    x="50"
    y="58"
    font-size="24"
    font-weight="bold"
    font-family="monospace"
    fill="#00ff41"
    text-anchor="middle"
    style="filter: drop-shadow(0 0 8px #00ff41)"
  >
    SC
  </text>
  
  <!-- Corner indicators -->
  <circle cx="30" cy="15" r="2" fill="#00ff41" opacity="0.8" />
  <circle cx="70" cy="15" r="2" fill="#00ff41" opacity="0.8" />
  <circle cx="85" cy="60" r="2" fill="#00ff41" opacity="0.8" />
  <circle cx="15" cy="60" r="2" fill="#00ff41" opacity="0.8" />
</svg>
