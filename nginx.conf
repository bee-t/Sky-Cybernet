# Nginx configuration for SKY-CYBERNET
# Production-ready configuration for high-scale traffic

# Upstream servers (add more for horizontal scaling)
upstream skycybernet_backend {
    least_conn;  # Load balancing algorithm
    
    server 127.0.0.1:3000 max_fails=3 fail_timeout=30s;
    # Add more servers for horizontal scaling:
    # server 127.0.0.1:3001 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:3002 max_fails=3 fail_timeout=30s;
    # server 127.0.0.1:3003 max_fails=3 fail_timeout=30s;
    
    keepalive 64;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=100r/s;
limit_req_zone $binary_remote_addr zone=api:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=upload:10m rate=5r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=addr:10m;

# Cache paths
proxy_cache_path /var/cache/nginx/skycybernet levels=1:2 keys_zone=skycybernet_cache:100m max_size=1g inactive=60m use_temp_path=off;

server {
    listen 80;
    listen [::]:80;
    server_name localhost;  # Change to your domain in production
    
    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Client body size (for uploads)
    client_max_body_size 10M;
    client_body_buffer_size 128k;
    
    # Timeouts
    client_body_timeout 12;
    client_header_timeout 12;
    keepalive_timeout 65;
    send_timeout 10;
    
    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";
    
    # Static files (uploads)
    location /uploads/ {
        alias /path/to/sky-cybernet/public/uploads/;  # Update this path
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
        
        # CORS for media
        add_header Access-Control-Allow-Origin "*";
        
        # Connection limit
        limit_conn addr 10;
    }
    
    # Next.js static files
    location /_next/static/ {
        proxy_pass http://sacnorad_backend;
        proxy_cache sacnorad_cache;
        proxy_cache_valid 200 1y;
        proxy_cache_valid 404 1m;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }
    
    # API routes with rate limiting
    location /_next/data/ {
        limit_req zone=api burst=10 nodelay;
        limit_conn addr 10;
        
        proxy_pass http://sacnorad_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
        proxy_no_cache 1;
    }
    
    # Upload/POST requests with stricter rate limiting
    location ~ \.(jpg|jpeg|png|gif|webp|mp4|mov|avi)$ {
        limit_req zone=upload burst=2 nodelay;
        limit_conn addr 5;
        
        proxy_pass http://sacnorad_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_request_buffering off;
        proxy_buffering off;
    }
    
    # Main application
    location / {
        limit_req zone=general burst=20 nodelay;
        limit_conn addr 20;
        
        proxy_pass http://sacnorad_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Caching for pages
        proxy_cache sacnorad_cache;
        proxy_cache_valid 200 10s;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        proxy_cache_background_update on;
        proxy_cache_lock on;
        
        # Pass cache status to application
        add_header X-Cache-Status $upstream_cache_status;
    }
    
    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}

